<!DOCTYPE html>
<html>
<head>
    <title>Citizen Registration | Police ERP</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0d1b2a, #1b263b);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-box {
            width: 100%;
            max-width: 450px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .btn-primary {
            background-color: #1b263b;
            border: none;
        }

        .btn-primary:hover {
            background-color: #0d1b2a;
        }
    </style>
</head>

<body>
    {% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }}">
        {{ message }}
      </div>
    {% endfor %}
  {% endif %}
{% endwith %}


<div class="card-box">

    <div class="text-center mb-3">
        <i class="bi bi-person-plus-fill fs-1 text-dark"></i>
        <h4 class="mt-2">Citizen Registration</h4>
        <p class="text-muted small">Police ERP Portal</p>
    </div>

    <form method="POST" action="/citizen_register">

        <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" name="name" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Aadhar Number</label>
            <input type="text" name="aadhar_no" class="form-control" maxlength="12" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Phone Number</label>
            <input type="text" name="phone" class="form-control" maxlength="15" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Address</label>
            <textarea name="address" class="form-control" rows="2" required></textarea>
        </div>
        <div class="mb-3">
    <label class="form-label">Password</label>
    <input type="password" name="password" class="form-control" required>
</div>


        <div class="d-grid">
            <button type="submit" class="btn btn-primary">
                Register
            </button>
        </div>

        <div class="text-center mt-3">
            <small>
                Already registered?
                <a href="/citizen_login">Login here</a>
            </small>
        </div>

    </form>

</div>

</body>
</html>
