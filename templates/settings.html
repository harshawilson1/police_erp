<!DOCTYPE html>
<html>
<head>
    <title>Settings</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            overflow-x: hidden;
            background-color: #f4f6f9;
        }

        /* SIDEBAR */
        .sidebar {
            height: 100vh;
            background: #0d1b2a;
            position: fixed;
            width: 240px;
            padding-top: 20px;
            transition: 0.3s;
        }

        .sidebar.collapsed {
            width: 70px;
        }

        .sidebar h4 {
            color: white;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            margin: 6px 10px;
            color: #cbd5e1;
            text-decoration: none;
            border-radius: 8px;
            font-size: 15px;
            transition: 0.2s;
        }

        .sidebar a i {
            font-size: 18px;
            width: 25px;
        }

        .sidebar a span {
            margin-left: 10px;
        }

        .sidebar a:hover {
            background: #1b263b;
            color: #fff;
            transform: translateX(4px);
        }

        .sidebar a.active {
            background: #1b263b;
            color: #fff;
            font-weight: 500;
        }

        .sidebar.collapsed a span {
            display: none;
        }

        /* CONTENT */
        .content {
            margin-left: 240px;
            padding: 20px;
            transition: 0.3s;
        }

        .content.collapsed {
            margin-left: 70px;
        }

        /* CARDS */
        .card-hover:hover {
            transform: translateY(-3px);
            transition: 0.2s;
        }

        /* PROFILE */
        .profile-img {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            object-fit: cover;
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h4 class="text-center mb-3">Police ERP</h4>
    <hr style="border-color: rgba(255,255,255,0.15);">

    <a href="/police_dashboard" class="active">
        <i class="bi bi-speedometer2"></i>
        <span>Dashboard</span>
    </a>

    <a href="/add_fir">
        <i class="bi bi-file-earmark-plus"></i>
        <span>Add FIR</span>
    </a>

    <a href="/view_fir">
        <i class="bi bi-folder2-open"></i>
        <span>View FIRs</span>
    </a>

    <a href="/court_management">
        <i class="bi bi-calendar-event"></i>
        <span>Court management</span>
    </a>
<a href="/emergency_logs">
<i class="bi bi-clock-history"></i>
<span>Emergency Logs</span>
</a>
    <a href="/pending_requests">
        <i class="bi bi-exclamation-triangle"></i>
        <span>Pending FIR Requests</span>
    </a>
    <a href="/station_report" >
        <i class="bi bi-bar-chart"></i>
        <span>Reports</span>
    </a>



    <a href="/settings">
        <i class="bi bi-gear"></i>
        <span>Settings</span>
    </a>
</div>

<!-- CONTENT -->
<div class="content">

    <h3 class="mb-4">Settings</h3>

    <div class="row g-4">

        <!-- PROFILE -->
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body">
                    <h5>👤 Update Profile</h5>

                    <form method="POST">
                        <input type="hidden" name="update_profile">

                        <div class="mb-3">
                            <label>Email</label>
                            <input type="email" name="email" value="{{ user.email }}" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label>Phone</label>
                            <input type="text" name="phone" value="{{ user.phone }}" class="form-control">
                        </div>

                        <button class="btn btn-primary">Update</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- PASSWORD -->
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body">
                    <h5>🔒 Change Password</h5>

                    <form method="POST">
                        <input type="hidden" name="change_password">

                        <div class="mb-3">
                            <label>New Password</label>
                            <input type="password" name="new_password" class="form-control">
                        </div>

                        <button class="btn btn-warning">Change Password</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- SYSTEM -->
        <div class="col-md-12">
            <div class="card shadow">
                <div class="card-body">
                    <h5>⚙️ System Settings</h5>

                    <button class="btn btn-secondary" onclick="toggleTheme()">
                        Toggle Dark Mode
                    </button>

                    <a href="/logout" class="btn btn-danger ms-2">
                        Logout
                    </a>
                </div>
            </div>
        </div>

    </div>

</div>

<script>
function toggleTheme() {
    document.body.classList.toggle("bg-dark");
    document.body.classList.toggle("text-white");
}
</script>

</body>
</html>
