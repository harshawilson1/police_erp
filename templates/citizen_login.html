<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Citizen Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: url("{{ url_for('static', filename='images/login-bg.png') }}") no-repeat center center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
        }

        .login-card {
            background: rgba(0, 0, 0, 0.65);
            padding: 30px;
            width: 350px;
            border-radius: 10px;
            color: #fff;
            text-align: center;
        }

        .login-card img {
            width: 80px;
            margin-bottom: 15px;
        }

        .login-card h3 {
            margin-bottom: 20px;
        }

        .form-control {
            background: rgba(255,255,255,0.9);
        }

        .btn-primary {
            width: 100%;
            margin-top: 10px;
        }

        .register-link {
            margin-top: 15px;
            display: block;
            color: #ddd;
            text-decoration: none;
        }

        .register-link:hover {
            text-decoration: underline;
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="https://cdn-icons-png.flaticon.com/512/3064/3064197.png" alt="User">
        <h3>Citizen Login</h3>

        <form method="POST">
            <div class="mb-3">
                <input type="text" name="username" class="form-control" placeholder="Enter Username" required>
            </div>

            <div class="mb-3">
                <input type="password" name="password" class="form-control" placeholder="Enter Password" required>
            </div>

            <button type="submit" class="btn btn-primary">Sign In</button>
        </form>

        <a href="/citizen_register" class="register-link">
            Create an Account
        </a>
    </div>

</body>
</html>
