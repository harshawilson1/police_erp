<!DOCTYPE html>
<html>
<head>
    <title>Pending FIR Requests</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

    <style>
        body {
            overflow-x: hidden;
            background-color: #f4f6f9;
        }

        /* SIDEBAR */
        .sidebar {
            height: 100vh;
            background: #0d1b2a;
            position: fixed;
            width: 240px;
            padding-top: 20px;
            transition: 0.3s;
        }

        .sidebar.collapsed {
            width: 70px;
        }

        .sidebar h4 {
            color: white;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            margin: 6px 10px;
            color: #cbd5e1;
            text-decoration: none;
            border-radius: 8px;
            font-size: 15px;
            transition: 0.2s;
        }

        .sidebar a i {
            font-size: 18px;
            width: 25px;
        }

        .sidebar a span {
            margin-left: 10px;
        }

        .sidebar a:hover {
            background: #1b263b;
            color: #fff;
            transform: translateX(4px);
        }

        .sidebar a.active {
            background: #1b263b;
            color: #fff;
            font-weight: 500;
        }

        .sidebar.collapsed a span {
            display: none;
        }

        /* CONTENT */
        .content {
            margin-left: 240px;
            padding: 20px;
            transition: 0.3s;
        }

        .content.collapsed {
            margin-left: 70px;
        }

        /* CARDS */
        .card-hover:hover {
            transform: translateY(-3px);
            transition: 0.2s;
        }

        /* PROFILE */
        .profile-img {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            object-fit: cover;
        }
    </style>
</head>
<body>
<div class="sidebar">
    <h4 class="text-center mb-3">Police ERP</h4>
    <hr style="border-color: rgba(255,255,255,0.15);">

    <a href="/police_dashboard" class="active">
        <i class="bi bi-speedometer2"></i>
        <span>Dashboard</span>
    </a>

    <a href="/add_fir">
        <i class="bi bi-file-earmark-plus"></i>
        <span>Add FIR</span>
    </a>

    <a href="/view_fir">
        <i class="bi bi-folder2-open"></i>
        <span>View FIRs</span>
    </a>

    <a href="#">
        <i class="bi bi-calendar-event"></i>
        <span>Court Dates</span>
    </a>
    <a href="/add_emergency_call">
<i class="bi bi-telephone"></i>
<span>Emergency Call</span>
</a>

<a href="/emergency_logs">
<i class="bi bi-clock-history"></i>
<span>Emergency Logs</span>
</a>
    <a href="/pending_requests">
        <i class="bi bi-exclamation-triangle"></i>
        <span>Pending FIR Requests</span>
    </a>
    <a href="/station_report" >
        <i class="bi bi-bar-chart"></i>
        <span>Reports</span>
    </a>

    <a href="/officer_profile">
        <i class="bi bi-people"></i>
        <span>Officers</span>
    </a>

    <a href="#">
        <i class="bi bi-gear"></i>
        <span>Settings</span>
    </a>
</div>
<div class="container mt-5">
    <h2 class="mb-4">Pending FIR Requests</h2>
<table class="table table-bordered">
    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Crime</th>
            <th>City</th>
            <th>Action</th>
        </tr>
    </thead>

    <tbody>
        {% for r in requests %}
        <tr>
            <td>{{ r.request_id }}</td>
            <td>{{ r.citizen_name }}</td>
            <td>{{ r.crime_type }}</td>
            <td>{{ r.city }}</td>
            <td>
                <form method="POST" action="/approve_request/{{ r.request_id }}">
                    <button name="decision" value="Approved" class="btn btn-success btn-sm">Approve</button>
                    <button name="decision" value="Rejected" class="btn btn-danger btn-sm">Reject</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>


</div>

</body>
</html>
